version: "3.8"

services:
  db:
    # #DS5-431: pin minor — evita major/minor bump silencioso em rebuilds.
    image: postgres:16.5-alpine3.20
    # #DS5-401: bind em loopback — acesso externo via SSH tunnel ou da rede docker interna
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=naviera_eco
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD obrigatorio}
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database_scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./naviera-api
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/naviera_eco
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD obrigatorio}
      # #DS5-405: JWT_SECRET obrigatorio — sem default. Minimo 32 bytes validado no boot.
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET obrigatorio (min 32 chars, use 'openssl rand -base64 48')}
      # #DS5-406: CORS_ORIGINS obrigatorio em qualquer deploy — sem fallback inseguro.
      - CORS_ORIGINS=${CORS_ORIGINS:?CORS_ORIGINS obrigatorio (ex: https://app.naviera.com.br)}
    depends_on:
      db:
        condition: service_healthy
    # #DS5-424: usa wget? — eclipse-temurin alpine nao tem wget. Troca por curl-less java probe.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8081 && echo -e 'GET /api/actuator/health HTTP/1.0\\r\\n\\r\\n' >&3 && head -c 1 <&3"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  app:
    build: ./naviera-app
    ports:
      - "8180:80"
      - "8443:443"
    volumes:
      # Montar certificados SSL para producao (Let's Encrypt ou manual)
      # Criar pasta certs/ com fullchain.pem e privkey.pem
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
