# ============================================================================
# Naviera Eco — Nginx Config (Producao)
# Wildcard SSL: *.naviera.com.br
# ============================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name *.naviera.com.br naviera.com.br;
    return 301 https://$host$request_uri;
}

# ============================================================================
# naviera.com.br (raiz, sem subdominio) — Site institucional
# IMPORTANTE: deve vir ANTES do wildcard *.naviera.com.br
# ============================================================================
server {
    listen 443 ssl;
    server_name naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    # DS4-027 fix: Content-Security-Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.naviera.com.br" always;

    # Protecao por senha (remover quando o site for publico)
    auth_basic "Acesso restrito";
    auth_basic_user_file /etc/nginx/.htpasswd_naviera;

    root /var/www/naviera-site;
    index index.html;

    # SPA — todas as rotas caem no index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estaticos (JS, CSS, imagens)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Downloads (instaladores Desktop e App)
    location /downloads/ {
        add_header Content-Disposition "attachment";
        add_header Cache-Control "no-cache";
    }
}

# ============================================================================
# API — api.naviera.com.br
# ============================================================================
server {
    listen 443 ssl;
    server_name api.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # DS4-028 fix: security headers faltantes no bloco API
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ============================================================================
# App Mobile — app.naviera.com.br
# ============================================================================
server {
    listen 443 ssl;
    server_name app.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # DS4-028 fix: security headers faltantes no bloco app
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    # DS4-027 fix: CSP para app mobile
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.naviera.com.br wss://api.naviera.com.br" always;

    root /var/www/naviera-app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ============================================================================
# Admin — admin.naviera.com.br (futuro)
# ============================================================================
server {
    listen 443 ssl;
    server_name admin.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.naviera.com.br" always;

    root /var/www/naviera-admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Tenant-Slug admin;
    }
}

# ============================================================================
# OCR PWA — ocr.naviera.com.br
# ============================================================================
server {
    listen 443 ssl;
    server_name ocr.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; media-src 'self' blob:" always;

    root /var/www/naviera-ocr;
    index index.html;

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # BFF proxy (mesmo Express do naviera-web)
    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Tenant-Slug ocr;
        client_max_body_size 15M;
    }
}

# ============================================================================
# Console Web — {slug}.naviera.com.br (qualquer subdominio nao listado acima)
# ============================================================================
server {
    listen 443 ssl;
    server_name *.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss://*.naviera.com.br" always;

    # Extrair subdominio
    set $tenant_slug "";
    if ($host ~* ^([a-z0-9-]+)\.naviera\.com\.br$) {
        set $tenant_slug $1;
    }

    root /var/www/naviera-web;
    index index.html;

    # Frontend (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # BFF Express (com subdominio como header)
    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Tenant-Slug $tenant_slug;
    }
}
