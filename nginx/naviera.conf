# ============================================================================
# Naviera Eco — Nginx Config (Producao)
# Wildcard SSL: *.naviera.com.br
# ============================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name *.naviera.com.br naviera.com.br;
    return 301 https://$host$request_uri;
}

# ============================================================================
# API — api.naviera.com.br
# ============================================================================
server {
    listen 443 ssl;
    server_name api.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ============================================================================
# App Mobile — app.naviera.com.br
# ============================================================================
server {
    listen 443 ssl;
    server_name app.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/naviera-app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ============================================================================
# Admin — admin.naviera.com.br (futuro)
# ============================================================================
server {
    listen 443 ssl;
    server_name admin.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/naviera-admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Tenant-Slug admin;
    }
}

# ============================================================================
# Console Web — {slug}.naviera.com.br (qualquer subdominio nao listado acima)
# ============================================================================
server {
    listen 443 ssl;
    server_name *.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Extrair subdominio
    set $tenant_slug "";
    if ($host ~* ^([a-z0-9-]+)\.naviera\.com\.br$) {
        set $tenant_slug $1;
    }

    root /var/www/naviera-web;
    index index.html;

    # Frontend (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # BFF Express (com subdominio como header)
    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Tenant-Slug $tenant_slug;
    }
}

# ============================================================================
# naviera.com.br (raiz, sem subdominio) — redireciona para app ou landing
# ============================================================================
server {
    listen 443 ssl;
    server_name naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Redirecionar para o app mobile ou landing page
    return 301 https://app.naviera.com.br$request_uri;
}
