# ============================================================================
# Naviera Eco — Nginx Config (Producao)
# Wildcard SSL: *.naviera.com.br
# ============================================================================

# #DS5-411: nao expor versao do nginx no header Server.
server_tokens off;

# #DS5-413: timeouts globais — fecha slowloris.
client_body_timeout 15s;
client_header_timeout 15s;
send_timeout 15s;
keepalive_timeout 30s 30s;
client_max_body_size 10M;
large_client_header_buffers 4 8k;

# #DS5-451: timeouts entre nginx e backend — evita conexoes penduradas se BFF/API travam.
proxy_connect_timeout 5s;
proxy_send_timeout 30s;
proxy_read_timeout 60s;

# #DS5-415: TLS hardening compartilhado por todos os servers.
#   Mozilla intermediate (TLS 1.2 + 1.3, ciphers seguros, session cache, OCSP).
ssl_prefer_server_ciphers on;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# #DS5-412: rate-limit zones — login restritivo, API geral mais permissivo.
#   $binary_remote_addr usa o IP visto pelo nginx (cuidado: por tras de Cloudflare, configurar real_ip).
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name *.naviera.com.br naviera.com.br;
    return 301 https://$host$request_uri;
}

# ============================================================================
# naviera.com.br (raiz, sem subdominio) — Site institucional
# IMPORTANTE: deve vir ANTES do wildcard *.naviera.com.br
# ============================================================================
server {
    listen 443 ssl;
    server_name naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    # #DS5-414: Referrer-Policy + Permissions-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # DS4-027 fix: Content-Security-Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.naviera.com.br; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Protecao por senha (remover quando o site for publico)
    auth_basic "Acesso restrito";
    auth_basic_user_file /etc/nginx/.htpasswd_naviera;

    root /var/www/naviera-site;
    index index.html;

    # SPA — todas as rotas caem no index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estaticos (JS, CSS, imagens)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Downloads (instaladores Desktop e App)
    location /downloads/ {
        add_header Content-Disposition "attachment";
        add_header Cache-Control "no-cache";
    }
}

# ============================================================================
# API — api.naviera.com.br
# ============================================================================
server {
    listen 443 ssl;
    server_name api.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # DS4-028 fix: security headers faltantes no bloco API
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    # #DS5-414
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # #DS5-412: rate-limit em /auth/login (brute force) — 5 req/min/IP, burst 3.
    location = /auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_conn conn_per_ip 10;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        # #DS5-412: rate-limit geral.
        limit_req zone=api burst=30 nodelay;
        limit_conn conn_per_ip 20;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ============================================================================
# App Mobile — app.naviera.com.br
# ============================================================================
server {
    listen 443 ssl;
    server_name app.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # DS4-028 fix: security headers faltantes no bloco app
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    # #DS5-414
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self), payment=()" always;
    # DS4-027 + #DS5-416: CSP para app mobile — frame-ancestors/base-uri/form-action/object-src adicionados.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://api.naviera.com.br wss://api.naviera.com.br; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    root /var/www/naviera-app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ============================================================================
# Admin — admin.naviera.com.br (futuro)
# ============================================================================
server {
    listen 443 ssl;
    server_name admin.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    # #DS5-414
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.naviera.com.br; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    root /var/www/naviera-admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # #DS5-412: rate-limit para BFF — aplica antes do middleware do Express.
        limit_req zone=api burst=30 nodelay;
        limit_conn conn_per_ip 20;
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # #DS5-417: o slug "admin" e palavra-reservada — o tenantMiddleware do BFF descarta
        #   resolucao por slug aqui e exige claim super_admin no JWT (ver routes/admin.js).
        proxy_set_header X-Tenant-Slug admin;
    }
}

# ============================================================================
# OCR PWA — ocr.naviera.com.br
# ============================================================================
server {
    listen 443 ssl;
    server_name ocr.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    # #DS5-414
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; media-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    root /var/www/naviera-ocr;
    index index.html;

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # BFF proxy (mesmo Express do naviera-web)
    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Tenant-Slug ocr;
        client_max_body_size 15M;
    }
}

# ============================================================================
# Console Web — {slug}.naviera.com.br (qualquer subdominio nao listado acima)
# ============================================================================
server {
    listen 443 ssl;
    server_name *.naviera.com.br;

    ssl_certificate /etc/letsencrypt/live/naviera.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naviera.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    # #DS5-414
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # #DS5-416: connect-src apenas para o proprio host (nao mais wildcard wss://*.naviera.com.br).
    #   frame-ancestors/base-uri/form-action/object-src adicionados para defesa-em-profundidade.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss://$host; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Extrair subdominio
    set $tenant_slug "";
    if ($host ~* ^([a-z0-9-]+)\.naviera\.com\.br$) {
        set $tenant_slug $1;
    }

    root /var/www/naviera-web;
    index index.html;

    # Frontend (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # BFF Express — login com rate-limit estrito antes do geral.
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_conn conn_per_ip 10;
        proxy_pass http://127.0.0.1:3002/api/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Tenant-Slug $tenant_slug;
    }

    # BFF Express (com subdominio como header)
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_conn conn_per_ip 20;
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Tenant-Slug $tenant_slug;
    }
}
