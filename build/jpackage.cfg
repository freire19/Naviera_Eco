# ============================================================================
# Naviera Desktop -- jpackage Configuration File
# ============================================================================
# This file contains common jpackage options that can be reused across
# platforms. Pass it to jpackage with: jpackage @build/jpackage.cfg
#
# NOTE: Platform-specific options (--win-menu, --linux-deb-maintainer, etc.)
# should be passed directly in the build script, not here.
# ============================================================================

# Application identity
--name Naviera
--app-version 1.0.0
--vendor "Naviera Eco"
--description "Sistema de Gestao Naviera"
--copyright "Copyright 2025 Naviera Eco"

# Entry point
--main-class gui.Launch
--main-jar naviera-desktop.jar

# JavaFX + Java platform modules (java.sql for DB, java.desktop for AWT/print/sound)
--add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.base,javafx.web,javafx.swing,javafx.media,java.base,java.sql,java.desktop,java.logging,java.naming,java.net.http,java.security.jgss,java.xml,java.prefs,java.datatransfer,java.scripting,java.management,jdk.unsupported

# JVM options for JavaFX compatibility
--java-options "--add-opens javafx.base/com.sun.javafx.reflect=ALL-UNNAMED"
--java-options "--add-opens javafx.graphics/com.sun.javafx.css=ALL-UNNAMED"
--java-options "--add-opens javafx.graphics/com.sun.javafx.scene=ALL-UNNAMED"
--java-options "--add-opens javafx.graphics/com.sun.javafx.scene.layout=ALL-UNNAMED"
--java-options "--add-opens javafx.controls/com.sun.javafx.scene.control=ALL-UNNAMED"
--java-options "--add-opens javafx.controls/javafx.scene.control.skin=ALL-UNNAMED"
--java-options "-Dfile.encoding=UTF-8"
