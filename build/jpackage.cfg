# ============================================================================
# Naviera Desktop -- jpackage Configuration File
# ============================================================================
# Reference file — the build.sh script passes all options directly.
# This file documents the complete module list for the runtime.
#
# Build JDK: Liberica Full JDK 17 (/opt/liberica-full-jdk-17)
# Why Liberica Full: includes JavaFX + all Java modules natively.
#   No external JavaFX SDK needed, no post-build patching.
# ============================================================================

# Application identity
--name Naviera
--app-version 1.0.0
--vendor "Naviera Eco"
--description "Sistema de Gestao Naviera"
--copyright "Copyright 2026 Naviera Eco"

# Entry point
--main-class gui.Launch
--main-jar naviera-desktop.jar

# All modules (JavaFX + Java platform)
# JavaFX: UI framework
# java.sql + java.sql.rowset: PostgreSQL database access
# java.desktop: AWT, printing, sound
# java.logging: java.util.logging
# java.naming: JNDI (JDBC dependency)
# java.transaction.xa: XA transactions (JDBC dependency)
# java.net.http: HTTP client (sync, version checker)
# java.xml: XML parsing
# jdk.unsupported: internal APIs used by JavaFX
--add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.base,javafx.web,javafx.swing,javafx.media,java.base,java.sql,java.sql.rowset,java.desktop,java.logging,java.naming,java.transaction.xa,java.net.http,java.security.jgss,java.xml,java.prefs,java.datatransfer,java.scripting,java.compiler,java.management,jdk.unsupported,jdk.unsupported.desktop,jdk.jsobject,jdk.xml.dom

# JVM options for JavaFX compatibility
--java-options "--add-opens javafx.base/com.sun.javafx.reflect=ALL-UNNAMED"
--java-options "--add-opens javafx.graphics/com.sun.javafx.css=ALL-UNNAMED"
--java-options "--add-opens javafx.graphics/com.sun.javafx.scene=ALL-UNNAMED"
--java-options "--add-opens javafx.graphics/com.sun.javafx.scene.layout=ALL-UNNAMED"
--java-options "--add-opens javafx.controls/com.sun.javafx.scene.control=ALL-UNNAMED"
--java-options "--add-opens javafx.controls/javafx.scene.control.skin=ALL-UNNAMED"
--java-options "-Dfile.encoding=UTF-8"
