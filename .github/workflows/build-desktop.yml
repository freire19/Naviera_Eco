name: Build Desktop Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Liberica Full JDK 17
        run: |
          wget -q "https://download.bell-sw.com/java/17.0.14+10/bellsoft-jdk17.0.14+10-linux-amd64-full.tar.gz" -O /tmp/liberica.tar.gz
          sudo mkdir -p /opt/liberica-full-jdk-17
          sudo tar xzf /tmp/liberica.tar.gz -C /opt/liberica-full-jdk-17 --strip-components=1

      - name: Update version
        run: |
          sed -i "s/APP_VERSION=\".*\"/APP_VERSION=\"${{ inputs.version }}\"/" build/build.sh

      - name: Build .deb
        run: |
          chmod +x build/build.sh
          build/build.sh

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: naviera-desktop-linux
          path: build/installer/*.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Liberica Full JDK 17
        run: |
          Invoke-WebRequest -Uri "https://download.bell-sw.com/java/17.0.14+10/bellsoft-jdk17.0.14+10-windows-amd64-full.zip" -OutFile "$env:TEMP\liberica.zip"
          Expand-Archive -Path "$env:TEMP\liberica.zip" -DestinationPath "C:\liberica-extract"
          $jdkDir = Get-ChildItem "C:\liberica-extract" | Select-Object -First 1
          Move-Item $jdkDir.FullName "C:\liberica-full-jdk-17"
          Write-Output "C:\liberica-full-jdk-17\bin" >> $env:GITHUB_PATH

      - name: Build .msi
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $JAVA_HOME = "C:\liberica-full-jdk-17"
          $JAVAC = "$JAVA_HOME\bin\javac.exe"
          $JAR = "$JAVA_HOME\bin\jar.exe"
          $JPACKAGE = "$JAVA_HOME\bin\jpackage.exe"

          $PROJECT = "${{ github.workspace }}"
          $SRC = "$PROJECT\src"
          $LIB = "$PROJECT\lib"
          $BUILD = "$PROJECT\build"
          $CLASSES = "$BUILD\classes"
          $DIST = "$BUILD\dist"
          $INSTALLER = "$BUILD\installer"

          # Clean & create dirs
          foreach ($d in @($CLASSES, $DIST, $INSTALLER)) {
            if (Test-Path $d) { Remove-Item $d -Recurse -Force }
            New-Item $d -ItemType Directory -Force | Out-Null
          }

          # Build classpath from lib/ JARs
          $libJars = Get-ChildItem "$LIB\*.jar" | ForEach-Object { $_.FullName }
          $LIB_CP = $libJars -join ";"

          # Compile
          $javaFiles = Get-ChildItem "$SRC" -Recurse -Filter "*.java" | ForEach-Object { $_.FullName }
          $javaFilesList = "$BUILD\sources.txt"
          $javaFiles | Out-File -FilePath $javaFilesList -Encoding UTF8
          Write-Host "Compiling $($javaFiles.Count) .java files..."

          & $JAVAC --add-modules javafx.controls,javafx.fxml,javafx.web,javafx.swing,javafx.media `
            -cp "$LIB_CP" -d "$CLASSES" -encoding UTF-8 -source 17 -target 17 `
            "@$javaFilesList"
          if ($LASTEXITCODE -ne 0) { throw "Compilation failed" }

          # Copy resources (FXML, CSS, PNG)
          Get-ChildItem "$SRC" -Recurse -Include "*.fxml","*.css","*.png" | ForEach-Object {
            $rel = $_.FullName.Substring($SRC.Length + 1)
            $dest = Join-Path $CLASSES $rel
            $destDir = Split-Path $dest -Parent
            if (!(Test-Path $destDir)) { New-Item $destDir -ItemType Directory -Force | Out-Null }
            Copy-Item $_.FullName $dest -Force
          }
          if (Test-Path "$PROJECT\resources") {
            Copy-Item "$PROJECT\resources\*" $CLASSES -Recurse -Force -ErrorAction SilentlyContinue
          }
          Write-Host "Resources copied"

          # Create JAR (manifest must use LF line endings and 72-char line limit)
          $cpEntries = $libJars | ForEach-Object { "lib/$([System.IO.Path]::GetFileName($_))" }
          $lines = @("Manifest-Version: 1.0", "Main-Class: gui.Launch")
          # Write Class-Path with line continuation (72 char limit)
          $cpLine = "Class-Path: " + ($cpEntries -join " ")
          $wrapped = @()
          while ($cpLine.Length -gt 70) {
            $wrapped += $cpLine.Substring(0, 70)
            $cpLine = " " + $cpLine.Substring(70)
          }
          $wrapped += $cpLine
          $lines += $wrapped
          $lines += ""
          $manifestContent = ($lines -join "`n") + "`n"
          [System.IO.File]::WriteAllText("$BUILD\MANIFEST.MF", $manifestContent, [System.Text.Encoding]::ASCII)

          & $JAR cfm "$DIST\naviera-desktop.jar" "$BUILD\MANIFEST.MF" -C "$CLASSES" .
          if ($LASTEXITCODE -ne 0) { throw "JAR creation failed" }

          # Copy lib JARs
          New-Item "$DIST\lib" -ItemType Directory -Force | Out-Null
          Copy-Item "$LIB\*.jar" "$DIST\lib\"
          Write-Host "JAR created"

          # Prepare jpackage input
          $JPINPUT = "$BUILD\jpackage-input"
          if (Test-Path $JPINPUT) { Remove-Item $JPINPUT -Recurse -Force }
          New-Item "$JPINPUT\lib" -ItemType Directory -Force | Out-Null
          Copy-Item "$DIST\naviera-desktop.jar" $JPINPUT
          Copy-Item "$LIB\*.jar" "$JPINPUT\lib\"

          # Icon (.ico for Windows)
          $iconOpt = @()
          if (Test-Path "$SRC\gui\icons\logo_icon.ico") {
            $iconOpt = @("--icon", "$SRC\gui\icons\logo_icon.ico")
          } elseif (Test-Path "$SRC\gui\icons\logo_icon.png") {
            $iconOpt = @("--icon", "$SRC\gui\icons\logo_icon.png")
          }

          # All modules
          $modules = "javafx.controls,javafx.fxml,javafx.graphics,javafx.base,javafx.web,javafx.swing,javafx.media"
          $modules += ",java.base,java.sql,java.sql.rowset,java.desktop,java.logging,java.naming"
          $modules += ",java.transaction.xa,java.net.http,java.security.jgss,java.xml,java.prefs"
          $modules += ",java.datatransfer,java.scripting,java.compiler,java.management"
          $modules += ",jdk.unsupported,jdk.unsupported.desktop,jdk.jsobject,jdk.xml.dom"

          Write-Host "Creating .msi with jpackage..."
          & $JPACKAGE `
            --input "$JPINPUT" `
            --main-jar "naviera-desktop.jar" `
            --main-class gui.Launch `
            --name Naviera `
            --app-version "${{ inputs.version }}" `
            --vendor "Naviera Eco" `
            --description "Sistema de Gestao Naviera" `
            --dest "$INSTALLER" `
            --type msi `
            --add-modules "$modules" `
            --java-options "--add-opens javafx.base/com.sun.javafx.reflect=ALL-UNNAMED" `
            --java-options "--add-opens javafx.graphics/com.sun.javafx.css=ALL-UNNAMED" `
            --java-options "--add-opens javafx.graphics/com.sun.javafx.scene=ALL-UNNAMED" `
            --java-options "--add-opens javafx.graphics/com.sun.javafx.scene.layout=ALL-UNNAMED" `
            --java-options "--add-opens javafx.controls/com.sun.javafx.scene.control=ALL-UNNAMED" `
            --java-options "--add-opens javafx.controls/javafx.scene.control.skin=ALL-UNNAMED" `
            --java-options "-Dfile.encoding=UTF-8" `
            --win-menu `
            --win-shortcut `
            --win-dir-chooser `
            @iconOpt
          if ($LASTEXITCODE -ne 0) { throw "jpackage failed" }

          Get-ChildItem "$INSTALLER" | ForEach-Object { Write-Host "$($_.Name) - $([math]::Round($_.Length/1MB, 1)) MB" }
          Write-Host "Build complete!"

      - name: Upload .msi
        uses: actions/upload-artifact@v4
        with:
          name: naviera-desktop-windows
          path: build/installer/*.msi

  deploy:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: naviera-desktop-linux
          path: installers/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: naviera-desktop-windows
          path: installers/

      - name: List installers
        run: ls -lh installers/

      - name: Deploy to VPS
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no installers/*.deb root@72.62.166.247:/var/www/naviera-site/downloads/naviera-desktop.deb
          sshpass -p "$VPS_PASSWORD" scp -o StrictHostKeyChecking=no installers/*.msi root@72.62.166.247:/var/www/naviera-site/downloads/naviera-desktop.msi
          echo "Deployed to VPS!"
