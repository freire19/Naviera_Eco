<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <title>Naviera - Sistema de Gestao</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- FAB OCR — puro HTML, CSS media query esconde em desktop -->
    <style>
      #fab-ocr-link {
        position:fixed; bottom:20px; right:20px; width:56px; height:56px;
        border-radius:50%; background:linear-gradient(135deg,#059669,#34D399);
        color:#fff; font-size:1.5rem; text-decoration:none; z-index:99999;
        display:flex; align-items:center; justify-content:center;
        box-shadow:0 4px 16px rgba(5,150,105,0.4);
      }
      @media (min-width:801px) { #fab-ocr-link { display:none; } }
    </style>
    <a id="fab-ocr-link" href="#" target="_blank" rel="noopener noreferrer" title="Lancar frete por foto">&#128247;</a>
    <script>
      (function() {
        var h = window.location.hostname;
        var ocrHost = h === 'localhost' ? h + ':5175' : 'ocr.' + h.replace(/^[^.]+\./, '');
        document.getElementById('fab-ocr-link').href = window.location.protocol + '//' + ocrHost;
      })();
    </script>
  </body>
</html>
