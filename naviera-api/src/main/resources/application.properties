# ══════════════════════════════════════════════════════════
# Naviera API — Configuração
# MESMO banco PostgreSQL do sistema desktop JavaFX
# ══════════════════════════════════════════════════════════

spring.application.name=naviera-api

# ── Banco de dados (mesmo do sistema desktop) ──
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/naviera_eco}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.open-in-view=false

# ── HikariCP (pool de conexões) ──
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.data-source-properties.socketTimeout=30
spring.datasource.hikari.data-source-properties.loginTimeout=5

# ── JWT ──
naviera.jwt.secret=${JWT_SECRET}
# DS4-035 fix: reduzido de 24h para 8h (barcos com conectividade intermitente)
naviera.jwt.expiration-ms=28800000

# ── Server ──
server.port=${SERVER_PORT:8081}
server.servlet.context-path=/api
# #DS5-046: nao incluir mensagem nem trace nas respostas de erro do Spring (stacktrace leak).
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ── Logging ──
# #DS5-045: garantir que SQL nao vaza nos logs mesmo em DEBUG (evita PII em traces).
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN

# ── Actuator ──
# #DS5-441: actuator restrito a `health`; check de origem (loopback) feito no SecurityConfig
#   para nao exigir abrir uma segunda porta de management.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── CORS ──
naviera.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8180}

# ── Versao do Sistema (fallback se tabela versao_sistema estiver vazia) ──
naviera.versao.desktop=1.0.0
naviera.versao.web=1.0.0
naviera.versao.app=1.0.0
naviera.versao.desktop.url-download=https://naviera.com.br/downloads/naviera-desktop.exe
naviera.versao.desktop.obrigatoria=false

# ── PSP (Payment Service Provider) ──
naviera.psp.provider=${PSP_PROVIDER:asaas}
naviera.psp.split-naviera-pct=${PSP_SPLIT_NAVIERA_PCT:1.50}

# ── Asaas ──
# Sandbox: https://sandbox.asaas.com/api/v3   Producao: https://api.asaas.com/v3
naviera.psp.asaas.base-url=${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
naviera.psp.asaas.api-key=${ASAAS_API_KEY:}
naviera.psp.asaas.webhook-secret=${ASAAS_WEBHOOK_SECRET:}
naviera.psp.asaas.naviera-subconta-id=${ASAAS_NAVIERA_SUBCONTA_ID:}

# ── Cifra at-rest ──
# #226: chave AES-256 (32 bytes base64) para cifrar totp_secret em bilhetes_digitais.
#   Ausente = dev (armazena plain). Obrigatoria em prod.
naviera.crypto.totp-key=${NAVIERA_CRYPTO_TOTP_KEY:}
