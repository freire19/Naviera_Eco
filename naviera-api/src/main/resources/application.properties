# ══════════════════════════════════════════════════════════
# Naviera API — Configuração
# MESMO banco PostgreSQL do sistema desktop JavaFX
# ══════════════════════════════════════════════════════════

spring.application.name=naviera-api

# ── Banco de dados (mesmo do sistema desktop) ──
spring.datasource.url=jdbc:postgresql://localhost:5432/sistema_embarcacao
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.open-in-view=false

# ── HikariCP (pool de conexões) ──
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.max-lifetime=1800000

# ── JWT ──
naviera.jwt.secret=${JWT_SECRET:naviera-secret-key-mudar-em-producao-2026}
naviera.jwt.expiration-ms=86400000

# ── Server ──
server.port=8080
server.servlet.context-path=/api

# ── CORS ──
naviera.cors.allowed-origins=http://localhost:3000,http://localhost:5173
